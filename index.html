<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Little Haunt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="frame">
      <div id="game" aria-label="game canvas"></div>

      <div id="hud" class="hidden">
        <div id="stats">
          <div id="hearts" aria-label="health">●●●</div>
          <div id="ability">
            SOUL <span id="ability-name">NONE</span>
          </div>
        </div>
        <div id="ability-tip"></div>
        <div id="hint">←→ move · SPACE jump · ↓ stomp · touch spirits to swap</div>
      </div>

      <div id="overlay" class="screen">
        <div class="panel">
          <p class="eyebrow">a quiet forest path</p>
          <h1>Little Haunt</h1>
          <p class="blurb">
            Kodama spirits share their gifts. Borrow a soul to glide over
            valleys, crawl under roots, and stomp through cracked earth.
          </p>
          <button id="start-btn" type="button">Walk into the Green</button>
          <p class="controls">←→ · space · ↓ · esc</p>
        </div>
      </div>

      <div id="pause" class="screen hidden">
        <div class="panel">
          <h1>Still</h1>
          <p class="blurb">The forest waits.</p>
          <button id="resume-btn" type="button">Resume</button>
        </div>
      </div>

      <div id="end" class="screen hidden">
        <div class="panel">
          <h1 id="end-title">Clear</h1>
          <p id="end-blurb" class="blurb"></p>
          <button id="again-btn" type="button">Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
